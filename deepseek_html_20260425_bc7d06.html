<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System Explorer</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel-bg: rgba(10, 10, 30, 0.85);
            --glass: rgba(20, 20, 50, 0.7);
            --text: #e0e0f0;
            --accent: #7eb8ff;
            --accent2: #ff9e4f;
            --glow: rgba(120, 160, 255, 0.3);
            --border: rgba(255, 255, 255, 0.12);
            --radius: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-x pan-y pinch-zoom;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        canvas {
            display: block;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #060610;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #ffb74d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loader-text {
            color: #ccc;
            margin-top: 18px;
            font-size: 1rem;
            letter-spacing: 0.05em;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        /* Top Control Bar */
        #top-bar {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        #top-bar button {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid transparent;
            color: #c8c8e0;
            padding: 8px 14px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font);
            letter-spacing: 0.02em;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #top-bar button:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 14px rgba(140, 170, 255, 0.2);
        }
        #top-bar button.active {
            background: rgba(140, 170, 255, 0.2);
            border-color: rgba(160, 190, 255, 0.5);
            color: #fff;
            box-shadow: 0 0 16px rgba(140, 170, 255, 0.35);
        }
        #top-bar button .icon {
            font-size: 1rem;
        }

        /* Language Switcher */
        #lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 101;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4px 6px;
            display: flex;
            gap: 2px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        #lang-switcher button {
            background: transparent;
            border: none;
            color: #b0b0cc;
            padding: 7px 11px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: var(--font);
            letter-spacing: 0.03em;
            transition: var(--transition);
            white-space: nowrap;
        }
        #lang-switcher button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        #lang-switcher button.active {
            background: rgba(180, 200, 255, 0.22);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 10px rgba(140, 170, 255, 0.25);
        }

        /* Planet Button Panel */
        #planet-panel {
            position: fixed;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 99;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-height: 80vh;
            overflow-y: auto;
        }
        #planet-panel button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            color: #c0c0d8;
            padding: 9px 13px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font);
            letter-spacing: 0.02em;
            transition: var(--transition);
            text-align: left;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }
        #planet-panel button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }
        #planet-panel button.active {
            background: rgba(160, 190, 255, 0.2);
            border-color: rgba(170, 200, 255, 0.5);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 18px rgba(140, 170, 255, 0.3);
        }
        #planet-panel button .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        /* Info Panel */
        #info-panel {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%) translateX(0);
            z-index: 98;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 20px;
            width: 280px;
            max-width: 85vw;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
            color: var(--text);
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-50%) translateX(30px);
            max-height: 75vh;
            overflow-y: auto;
        }
        #info-panel.visible {
            opacity: 1;
            pointer-events: all;
            transform: translateY(-50%) translateX(0);
        }
        #info-panel h2 {
            font-size: 1.5rem;
            margin-bottom: 4px;
            letter-spacing: 0.03em;
            color: #fff;
        }
        #info-panel .planet-type {
            font-size: 0.85rem;
            color: #aab;
            margin-bottom: 14px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        #info-panel .info-row {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            font-size: 0.85rem;
        }
        #info-panel .info-row .label {
            color: #99a;
            font-weight: 500;
        }
        #info-panel .info-row .value {
            color: #e0e0f0;
            font-weight: 600;
            text-align: right;
        }
        #info-panel .fun-fact {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            font-size: 0.8rem;
            line-height: 1.45;
            color: #c8c8e0;
            border-left: 3px solid var(--accent2);
        }
        #info-panel .close-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #ccc;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #info-panel .close-btn:hover {
            background: rgba(255, 80, 80, 0.3);
            color: #fff;
        }

        /* Mobile hint */
        #mobile-hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            background: var(--glass);
            color: #999;
            font-size: 0.7rem;
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            letter-spacing: 0.03em;
            transition: opacity 1s ease;
            opacity: 0.7;
            border: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #planet-panel {
                left: 4px;
                padding: 5px;
                gap: 2px;
                border-radius: 12px;
                max-height: 65vh;
            }
            #planet-panel button {
                padding: 7px 9px;
                font-size: 0.7rem;
                gap: 5px;
                min-width: 90px;
                border-radius: 8px;
            }
            #planet-panel button .dot {
                width: 7px;
                height: 7px;
            }
            #info-panel {
                right: 4px;
                width: 240px;
                padding: 16px 14px;
                font-size: 0.75rem;
                border-radius: 12px;
            }
            #info-panel h2 {
                font-size: 1.2rem;
            }
            #top-bar {
                top: 6px;
                gap: 4px;
                padding: 4px 8px;
                border-radius: 22px;
            }
            #top-bar button {
                padding: 6px 10px;
                font-size: 0.7rem;
                border-radius: 16px;
            }
            #lang-switcher {
                top: 8px;
                right: 6px;
                padding: 2px 3px;
                border-radius: 18px;
            }
            #lang-switcher button {
                padding: 5px 8px;
                font-size: 0.68rem;
            }
            #mobile-hint {
                bottom: 12px;
                font-size: 0.65rem;
                padding: 6px 12px;
            }
        }
        @media (max-width: 480px) {
            #planet-panel {
                left: 2px;
                gap: 1px;
                padding: 3px;
                border-radius: 8px;
            }
            #planet-panel button {
                padding: 5px 6px;
                font-size: 0.65rem;
                min-width: 65px;
                border-radius: 6px;
                gap: 3px;
            }
            #planet-panel button .dot {
                width: 5px;
                height: 5px;
            }
            #info-panel {
                right: 2px;
                width: 200px;
                padding: 12px 10px;
                border-radius: 10px;
            }
            #info-panel h2 {
                font-size: 1rem;
            }
            #info-panel .info-row {
                font-size: 0.7rem;
                padding: 4px 0;
            }
            #top-bar button {
                padding: 5px 7px;
                font-size: 0.65rem;
                border-radius: 14px;
            }
        }
    </style>
</head>

    <!-- Loading Screen -->

        <div class="loader-ring"></div>
        <div class="loader-text">Loading Solar System...</div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Language Switcher -->
    <div id="lang-switcher">
        <button data-lang="vi" title="Tiếng Việt">🇻🇳 VI</button>
        <button data-lang="en" class="active" title="English">🇬🇧 EN</button>
        <button data-lang="ja" title="日本語">🇯🇵 日本語</button>
        <button data-lang="fr" title="Français">🇫🇷 FR</button>
    </div>

    <!-- Top Control Bar -->
    <div id="top-bar">
        <button id="btn-pause" title="Pause / Resume Orbits"><span class="icon">⏯️</span> <span data-key="pause">Pause</span></button>
        <button id="btn-reset" title="Reset Camera"><span class="icon">🔄</span> <span data-key="reset">Reset</span></button>
        <button id="btn-orbits" class="active" title="Toggle Orbit Lines"><span class="icon">🔵</span> <span data-key="orbits">Orbits</span></button>
        <button id="btn-labels" title="Toggle Planet Labels"><span class="icon">🏷️</span> <span data-key="labels">Labels</span></button>
        <button id="btn-fullscreen" title="Fullscreen"><span class="icon">⛶</span> <span data-key="fullscreen">Full</span></button>
    </div>

    <!-- Planet Button Panel -->
    <div id="planet-panel"></div>

    <!-- Info Panel -->
    <div id="info-panel">
        <button class="close-btn" id="info-close">✕</button>
        <h2 id="info-name"></h2>
        <div class="planet-type" id="info-type"></div>
        <div class="info-row"><span class="label" data-key="distance">Distance from Sun</span><span class="value" id="info-distance"></span></div>
        <div class="info-row"><span class="label" data-key="diameter">Diameter</span><span class="value" id="info-diameter"></span></div>
        <div class="info-row"><span class="label" data-key="gravity">Gravity</span><span class="value" id="info-gravity"></span></div>
        <div class="info-row"><span class="label" data-key="moons">Moons</span><span class="value" id="info-moons"></span></div>
        <div class="fun-fact" id="info-fact"></div>
    </div>

    <!-- Mobile hint -->
    <div id="mobile-hint">🖐️ Drag to rotate &bull; Pinch to zoom &bull; Double-tap to reset</div>

        function createStarfield() {
            const starsCount = 2500;
            const positions = new Float32Array(starsCount * 3);
            const colors = new Float32Array(starsCount * 3);
            const sizes = new Float32Array(starsCount);

            for (let i = 0; i < starsCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const radius = 55 + Math.random() * 45;
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);

                const colorChoice = Math.random();
                if (colorChoice < 0.1) {
                    colors[i * 3] = 0.7;
                    colors[i * 3 + 1] = 0.8;
                    colors[i * 3 + 2] = 1.0;
                } else if (colorChoice < 0.2) {
                    colors[i * 3] = 1.0;
                    colors[i * 3 + 1] = 0.85;
                    colors[i * 3 + 2] = 0.6;
                } else {
                    const brightness = 0.6 + Math.random() * 0.4;
                    colors[i * 3] = brightness;
                    colors[i * 3 + 1] = brightness;
                    colors[i * 3 + 2] = brightness;
                }
                sizes[i] = 0.12 + Math.random() * 0.6;
            }

            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const starMat = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.9,
            });

            const stars = new THREE.Points(starGeo, starMat);
            stars.name = 'starfield';
            scene.add(stars);
            return stars;
        }
        const starfield = createStarfield();

        function createCanvasTexture(width, height, drawFn) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            drawFn(ctx, width, height);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapU = THREE.RepeatWrapping;
            return texture;
        }

        function sunTexture() {
            return createCanvasTexture(512, 256, (ctx, w, h) => {
                const gradient = ctx.createRadialGradient(w / 2, h / 2, w * 0.05, w / 2, h / 2, w * 0.7);
                gradient.addColorStop(0, '#ffffdd');
                gradient.addColorStop(0.25, '#fff8c0');
                gradient.addColorStop(0.5, '#ffcc44');
                gradient.addColorStop(0.75, '#ff9922');
                gradient.addColorStop(0.9, '#ee6611');
                gradient.addColorStop(1, '#cc4400');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 300; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    const r = Math.random() * 4;
                    ctx.fillStyle = `rgba(255,${200+Math.random()*55},${50+Math.random()*100},${0.3+Math.random()*0.5})`;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function earthTexture() {
            return createCanvasTexture(512, 256, (ctx, w, h) => {
                const oceanGrad = ctx.createLinearGradient(0, 0, 0, h);
                oceanGrad.addColorStop(0, '#1a5599');
                oceanGrad.addColorStop(0.3, '#2266bb');
                oceanGrad.addColorStop(0.5, '#3388dd');
                oceanGrad.addColorStop(0.7, '#2266bb');
                oceanGrad.addColorStop(1, '#1a5599');
                ctx.fillStyle = oceanGrad;
                ctx.fillRect(0, 0, w, h);
                const continents = [
                    { x: 0.2, y: 0.3, rx: 0.15, ry: 0.2 },
                    { x: 0.35, y: 0.25, rx: 0.1, ry: 0.18 },
                    { x: 0.5, y: 0.35, rx: 0.12, ry: 0.22 },
                    { x: 0.65, y: 0.3, rx: 0.14, ry: 0.19 },
                    { x: 0.8, y: 0.28, rx: 0.08, ry: 0.25 },
                    { x: 0.15, y: 0.55, rx: 0.1, ry: 0.15 },
                    { x: 0.4, y: 0.6, rx: 0.13, ry: 0.16 },
                    { x: 0.7, y: 0.55, rx: 0.11, ry: 0.2 },
                    { x: 0.85, y: 0.6, rx: 0.09, ry: 0.14 },
                ];
                continents.forEach(c => {
                    ctx.fillStyle = '#3a8c3a';
                    ctx.beginPath();
                    ctx.ellipse(c.x * w, c.y * h, c.rx * w, c.ry * h, Math.random() * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#4ca64c';
                    ctx.beginPath();
                    ctx.ellipse(c.x * w + w * 0.02, c.y * h - h * 0.02, c.rx * w * 0.7, c.ry * h * 0.7, Math
                        .random() * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                });
                for (let i = 0; i < 60; i++) {
                    ctx.fillStyle = `rgba(255,255,255,${0.1+Math.random()*0.3})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function jupiterTexture() {
            return createCanvasTexture(512, 256, (ctx, w, h) => {
                const baseGrad = ctx.createLinearGradient(0, 0, 0, h);
                baseGrad.addColorStop(0, '#c8a878');
                baseGrad.addColorStop(0.2, '#e8d8b8');
                baseGrad.addColorStop(0.4, '#c89860');
                baseGrad.addColorStop(0.5, '#f0e0c8');
                baseGrad.addColorStop(0.6, '#d4a870');
                baseGrad.addColorStop(0.8, '#e0c898');
                baseGrad.addColorStop(1, '#c09058');
                ctx.fillStyle = baseGrad;
                ctx.fillRect(0, 0, w, h);
                for (let y = 0; y < h; y += 8) {
                    const alpha = 0.1 + Math.random() * 0.25;
                    ctx.fillStyle = `rgba(${180+Math.random()*75},${100+Math.random()*80},${40+Math.random()*50},${alpha})`;
                    ctx.fillRect(0, y, w, 6 + Math.random() * 6);
                }
                const spotX = w * 0.55;
                const spotY = h * 0.45;
                const spotGrad = ctx.createRadialGradient(spotX, spotY, 8, spotX, spotY, 22);
                spotGrad.addColorStop(0, '#e88060');
                spotGrad.addColorStop(0.5, '#d06040');
                spotGrad.addColorStop(1, 'rgba(200,120,80,0)');
                ctx.fillStyle = spotGrad;
                ctx.beginPath();
                ctx.ellipse(spotX, spotY, 20, 10, 0.1, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function saturnTexture() {
            return createCanvasTexture(256, 128, (ctx, w, h) => {
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#f5e8c8');
                grad.addColorStop(0.3, '#f0ddb0');
                grad.addColorStop(0.5, '#e8d098');
                grad.addColorStop(0.7, '#f0ddb0');
                grad.addColorStop(1, '#f5e8c8');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
                for (let y = 0; y < h; y += 3) {
                    ctx.fillStyle = `rgba(220,200,160,${0.05+Math.random()*0.1})`;
                    ctx.fillRect(0, y, w, 1 + Math.random() * 2);
                }
            });
        }

        function genericPlanetTexture(baseColor, variation) {
            return createCanvasTexture(128, 64, (ctx, w, h) => {
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                const r = parseInt(baseColor.slice(1, 3), 16);
                const g = parseInt(baseColor.slice(3, 5), 16);
                const b = parseInt(baseColor.slice(5, 7), 16);
                grad.addColorStop(0, `rgb(${Math.min(255,r+variation)},${Math.min(255,g+variation)},${Math.min(255,b+variation)})`);
                grad.addColorStop(0.5, baseColor);
                grad.addColorStop(1,
                    `rgb(${Math.max(0,r-variation)},${Math.max(0,g-variation)},${Math.max(0,b-variation)})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 40; i++) {
                    ctx.fillStyle =
                        `rgba(${r+Math.random()*30-15},${g+Math.random()*30-15},${b+Math.random()*30-15},0.08)`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 8, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function createGlowTexture(innerColor, outerColor, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(size / 2, size / 2, size * 0.1, size / 2, size / 2, size * 0.5);
            gradient.addColorStop(0, innerColor);
            gradient.addColorStop(0.3, innerColor);
            gradient.addColorStop(1, outerColor);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createLabelSprite(text) {

            const spriteMat = new THREE.SpriteMaterial({

        function createPlanetMesh(key, data) {
            const group = new THREE.Group();
            group.name = key;

            let texture;
            if (key === 'sun') texture = sunTexture();
            else if (key === 'earth') texture = earthTexture();
            else if (key === 'jupiter') texture = jupiterTexture();
            else if (key === 'saturn') texture = saturnTexture();
            else texture = genericPlanetTexture(data.color, 25);

            const geometry = new THREE.SphereGeometry(data.size, 64, 48);
            const material = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: key === 'sun' ? 0.3 : 0.7,
                metalness: key === 'sun' ? 0.1 : 0.05,
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.name = key + '-mesh';
            group.add(mesh);

            // Saturn rings
            if (data.hasRings) {
                const ringGeo = new THREE.RingGeometry(data.size * 1.4, data.size * 2.1, 72);
                const ringCanvas = document.createElement('canvas');
                ringCanvas.width = 256;
                ringCanvas.height = 16;
                const rctx = ringCanvas.getContext('2d');
                const rGrad = rctx.createLinearGradient(0, 0, 256, 0);
                rGrad.addColorStop(0, 'rgba(200,180,140,0.1)');
                rGrad.addColorStop(0.15, 'rgba(220,200,160,0.7)');
                rGrad.addColorStop(0.3, 'rgba(240,220,180,0.9)');
                rGrad.addColorStop(0.45, 'rgba(200,180,140,0.5)');
                rGrad.addColorStop(0.5, 'rgba(180,160,120,0.2)');
                rGrad.addColorStop(0.55, 'rgba(200,180,140,0.5)');
                rGrad.addColorStop(0.7, 'rgba(240,220,180,0.9)');
                rGrad.addColorStop(0.85, 'rgba(220,200,160,0.7)');
                rGrad.addColorStop(1, 'rgba(200,180,140,0.1)');
                rctx.fillStyle = rGrad;
                rctx.fillRect(0, 0, 256, 16);
                const ringTex = new THREE.CanvasTexture(ringCanvas);
                ringTex.colorSpace = THREE.SRGBColorSpace;
                const ringMat = new THREE.MeshStandardMaterial({
                    map: ringTex,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.85,
                    roughness: 0.6,
                    metalness: 0.05,
                    depthWrite: true,
                });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.rotation.x = Math.PI / 2 + 0.45;
                ringMesh.name = key + '-rings';
                group.add(ringMesh);
            }

            // Sun glow
            if (key === 'sun') {
                const glowTex = createGlowTexture('rgba(255,200,80,0.9)', 'rgba(255,100,20,0)', 512);
                const glowMat = new THREE.SpriteMaterial({
                    map: glowTex,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    depthTest: false,
                    transparent: true,
                    opacity: 0.8,
                });
                sunGlowSprite = new THREE.Sprite(glowMat);
                sunGlowSprite.scale.set(14, 14, 1);
                sunGlowSprite.name = 'sun-glow';
                group.add(sunGlowSprite);

                const glowTex2 = createGlowTexture('rgba(255,240,180,0.6)', 'rgba(255,150,40,0)', 256);
                const glowMat2 = new THREE.SpriteMaterial({
                    map: glowTex2,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    depthTest: false,
                    transparent: true,
                    opacity: 0.5,
                });
                const glowSprite2 = new THREE.Sprite(glowMat2);
                glowSprite2.scale.set(20, 20, 1);
                glowSprite2.name = 'sun-glow-outer';
                group.add(glowSprite2);
            }

            // Orbit pivot
            const pivot = new THREE.Object3D();
            pivot.name = key + '-pivot';
            pivot.add(group);
            group.position.set(data.orbitRadius, 0, 0);

            // Orbit line
            const orbitPoints = [];
            const orbitSegments = 200;
            for (let i = 0; i <= orbitSegments; i++) {
                const angle = (i / orbitSegments) * Math.PI * 2;
                orbitPoints.push(new THREE.Vector3(Math.cos(angle) * data.orbitRadius, 0, Math.sin(angle) * data
                    .orbitRadius));
            }
            const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
            const orbitMat = new THREE.LineBasicMaterial({
                color: 0x334466,
                transparent: true,
                opacity: 0.4,
                depthTest: true,
            });
            const orbitLine = new THREE.Line(orbitGeo, orbitMat);
            orbitLine.name = key + '-orbit';
            orbitLine.visible = showOrbits;
            orbitLines.push(orbitLine);
            scene.add(orbitLine);

            // Label sprite
            const labelSprite = createLabelSprite(t(key));
            labelSprite.name = key + '-label';
            labelSprites.push({ sprite: labelSprite, key: key, group: group });
            group.add(labelSprite);
            labelSprite.position.y = data.size + 1.2;

            scene.add(pivot);
            planetObjects[key] = { pivot, group, mesh, data, labelSprite };
            planetMeshes.push({ key, mesh, group, pivot, data });
            return { pivot, group, mesh, data, labelSprite };
        }

        // Create all planets
        planetKeys.forEach(key => {
            createPlanetMesh(key, planetDataMap[key]);
        });

        function createSpaceParticles() {
            const count = 400;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 3 + Math.random() * 45;
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                size: 0.04,
                color: 0x8899cc,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.6,
            });
            const particles = new THREE.Points(geo, mat);
            particles.name = 'space-particles';
            scene.add(particles);
            return particles;
        }

        // ─────────────────────────────────────
        function buildPlanetPanel() {
            planetPanel.innerHTML = '';
            planetKeys.forEach(key => {
                const btn = document.createElement('button');
                btn.dataset.planet = key;
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.style.backgroundColor = planetDataMap[key].color;
                const label = document.createElement('span');
                label.textContent = t(key);
                label.dataset.key = key;
                btn.appendChild(dot);
                btn.appendChild(label);
                btn.addEventListener('click', () => selectPlanet(key));
                planetPanel.appendChild(btn);
            });
        }
        buildPlanetPanel();

        function updatePlanetPanelLabels() {
            const buttons = planetPanel.querySelectorAll('button');
            buttons.forEach(btn => {
                const key = btn.dataset.planet;
                const labelSpan = btn.querySelector('span[data-key]');
                if (labelSpan && key) {
                    labelSpan.textContent = t(key);
                }
            });
            updateActiveButton();
        }

        function updateActiveButton() {
            const buttons = planetPanel.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.planet === selectedPlanetKey);
            });
        }

        // ─────────────────────────────────────
        // INFO PANEL
        // ─────────────────────────────────────
        function updateInfoPanel(key) {
            if (!key || !planetDataMap[key]) {
                infoPanel.classList.remove('visible');
                return;
            }
            const data = planetDataMap[key];
            infoName.textContent = t(key);
            infoType.textContent = t(data.typeKey);
            infoDistance.textContent = data.distance;
            infoDiameter.textContent = data.diameter;
            infoGravity.textContent = data.gravity;
            infoMoons.textContent = data.moons;
            infoFact.textContent = t(data.factKey);
            infoPanel.classList.add('visible');
        }

        function hideInfoPanel() {
            infoPanel.classList.remove('visible');
            selectedPlanetKey = null;
            updateActiveButton();
            targetLookAt.set(0, 0, 0);
            isAnimatingCamera = true;
            cameraLerpSpeed = 0.04;
            resetPlanetHighlights();
        }

        infoClose.addEventListener('click', hideInfoPanel);

        // ─────────────────────────────────────
        // SELECT PLANET
        // ─────────────────────────────────────
        function resetPlanetHighlights() {
            planetMeshes.forEach(p => {
                if (p.mesh && p.mesh.material && p.mesh.material.emissive) {
                    p.mesh.material.emissive.set(0x000000);
                    p.mesh.material.emissiveIntensity = 0;
                }
            });
        }

        function selectPlanet(key) {
            selectedPlanetKey = key;
            updateActiveButton();
            updateInfoPanel(key);
            const obj = planetObjects[key];
            if (obj && obj.group) {
                const worldPos = new THREE.Vector3();
                obj.group.getWorldPosition(worldPos);
                targetLookAt.copy(worldPos);
                isAnimatingCamera = true;
                cameraLerpSpeed = 0.07;
            }
            resetPlanetHighlights();
            const meshData = planetMeshes.find(p => p.key === key);
            if (meshData && meshData.mesh && meshData.mesh.material) {
                meshData.mesh.material.emissive = new THREE.Color(0x444444);
                meshData.mesh.material.emissiveIntensity = 0.5;
            }
        }

        // ─────────────────────────────────────
        // TOP BAR CONTROLS
        // ─────────────────────────────────────
        function updateTopBarLabels() {
            document.querySelectorAll('#top-bar [data-key]').forEach(el => {
                const k = el.dataset.key;
                if (k === 'pause' && isPaused) el.textContent = t('resume');
                else if (k === 'pause') el.textContent = t('pause');
                else el.textContent = t(k);
            });
        }

        btnPause.addEventListener('click', () => {
            isPaused = !isPaused;
            updateTopBarLabels();
            btnPause.classList.toggle('active', isPaused);
        });

        btnReset.addEventListener('click', () => {
            targetLookAt.set(0, 0, 0);
            isAnimatingCamera = true;
            cameraLerpSpeed = 0.08;
            hideInfoPanel();
            controls.target.set(0, 0, 0);
            camera.position.set(18, 14, 22);
            controls.update();
        });

        btnOrbits.addEventListener('click', () => {
            showOrbits = !showOrbits;
            btnOrbits.classList.toggle('active', showOrbits);
            orbitLines.forEach(line => { line.visible = showOrbits; });
        });

        btnLabels.addEventListener('click', () => {
            showLabels = !showLabels;
            btnLabels.classList.toggle('active', showLabels);
            labelSprites.forEach(ls => {
                if (ls.sprite) ls.sprite.visible = showLabels;
            });
        });

        btnFullscreen.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.body.requestFullscreen().catch(() => {});
            }
        });

        // ─────────────────────────────────────
        // LANGUAGE SWITCHER
        // ─────────────────────────────────────
        langSwitcher.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                langSwitcher.querySelectorAll('button').forEach(b => b.classList.remove(
                    'active'));
                btn.classList.add('active');
                updateAllText();
            });
        });

        function updateAllText() {
            updatePlanetPanelLabels();
            updateTopBarLabels();
            updateLabelSprites();
            if (selectedPlanetKey) {
                updateInfoPanel(selectedPlanetKey);
            }
            document.querySelectorAll('[data-key]').forEach(el => {
                const k = el.dataset.key;
                if (el.tagName === 'SPAN' && el.closest('#planet-panel')) return;
                if (k && translations[currentLang]?.[k]) {
                    el.textContent = translations[currentLang][k];
                }
            });
        }

        function updateLabelSprites() {
            labelSprites.forEach(ls => {
                if (ls.sprite && ls.sprite.material && ls.sprite.material.map) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 256;
                    canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 24px "Segoe UI", system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(t(ls.key), 128, 32);
                    const texture = new THREE.CanvasTexture(canvas);
                    texture.colorSpace = THREE.SRGBColorSpace;
                    texture.minFilter = THREE.LinearFilter;
                    ls.sprite.material.map.dispose();
                    ls.sprite.material.map = texture;
                    ls.sprite.material.needsUpdate = true;
                }
            });
        }

        // ─────────────────────────────────────
        // DOUBLE CLICK / TAP TO RESET
        // ─────────────────────────────────────
        let lastClickTime = 0;
        renderer.domElement.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastClickTime < 300) {
                // Double click
                targetLookAt.set(0, 0, 0);
                isAnimatingCamera = true;
                cameraLerpSpeed = 0.08;
                hideInfoPanel();
                controls.target.set(0, 0, 0);
            }
            lastClickTime = now;
        });

        // ─────────────────────────────────────
        // RESIZE HANDLER
        // ─────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─────────────────────────────────────
        // KEYBOARD SHORTCUTS
        // ─────────────────────────────────────
        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'p':
                    isPaused = !isPaused;
                    updateTopBarLabels();
                    btnPause.classList.toggle('active', isPaused);
                    break;
                case 'r':
                    targetLookAt.set(0, 0, 0);
                    isAnimatingCamera = true;
                    cameraLerpSpeed = 0.08;
                    hideInfoPanel();
                    controls.target.set(0, 0, 0);
                    break;
                case 'o':
                    showOrbits = !showOrbits;
                    btnOrbits.classList.toggle('active', showOrbits);
                    orbitLines.forEach(line => { line.visible = showOrbits; });
                    break;
                case 'l':
                    showLabels = !showLabels;
                    btnLabels.classList.toggle('active', showLabels);
                    labelSprites.forEach(ls => { if (ls.sprite) ls.sprite.visible = showLabels; });
                    break;
                case 'f':
                    if (document.fullscreenElement) document.exitFullscreen();
                    else document.body.requestFullscreen().catch(() => {});
                    break;
                case 'escape':
                    hideInfoPanel();
                    break;
            }
        });

        // ─────────────────────────────────────
        // ANIMATION LOOP
        // ─────────────────────────────────────
        const clock = new THREE.Clock();

        function animate(timestamp) {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const elapsed = timestamp * 0.001;

            // Update orbits
            if (!isPaused) {
                planetKeys.forEach(key => {
                    const obj = planetObjects[key];
                    if (!obj || !obj.pivot) return;
                    if (obj.data.orbitSpeed > 0) {
                        obj.pivot.rotation.y += obj.data.orbitSpeed * dt * 2;
                    }
                    if (obj.data.rotationSpeed > 0 && obj.group) {
                        const mesh = obj.group.children.find(c => c.name === key + '-mesh');
                        if (mesh) mesh.rotation.y += obj.data.rotationSpeed * dt * 3;
                    }
                });
            }

            // Rotate starfield slowly
            if (starfield) {
                starfield.rotation.y += dt * 0.015;
                starfield.rotation.x += dt * 0.005;
            }
            if (spaceParticles) {
                spaceParticles.rotation.y += dt * 0.02;
            }

            // Sun glow pulsation
            if (sunGlowSprite) {
                const pulse = 1 + Math.sin(elapsed * 2.5) * 0.08 + Math.sin(elapsed * 5.7) * 0.04;
                sunGlowSprite.scale.set(14 * pulse, 14 * pulse, 1);
            }

            // Smooth camera animation
            if (isAnimatingCamera) {
                controls.target.lerp(targetLookAt, cameraLerpSpeed);
                if (controls.target.distanceTo(targetLookAt) < 0.15) {
                    controls.target.copy(targetLookAt);
                    isAnimatingCamera = false;
                }
            }

            // Update label sprite positions to follow planets
            labelSprites.forEach(ls => {
                if (ls.sprite && ls.group) {
                    const worldPos = new THREE.Vector3();
                    ls.group.getWorldPosition(worldPos);
                    ls.sprite.position.copy(ls.group.position);
                }
            });

            controls.update();
            renderer.render(scene, camera);

            // Hide mobile hint after some interaction
            if (mobileHint.style.opacity > 0 && (controls.target.distanceTo(new THREE.Vector3(0, 0, 0)) > 0.5 ||
                    selectedPlanetKey)) {
                mobileHint.style.transition = 'opacity 2s ease';
                mobileHint.style.opacity = '0';
                setTimeout(() => {
                    if (mobileHint.style.opacity === '0') mobileHint.style.display = 'none';
                }, 2000);
            }
        }

        // ─────────────────────────────────────
        // INITIALIZATION
        // ─────────────────────────────────────
        function init() {
            updateTopBarLabels();
            updateAllText();
            // Hide loading screen
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                // Remove loading screen after transition
                setTimeout(() => {
                    if (loadingScreen.parentNode) loadingScreen.parentNode.removeChild(loadingScreen);
                }, 700);
            }, 800);
            // Start animation
            requestAnimationFrame(animate);
        }

        // Wait a frame for everything to settle
        setTimeout(init, 300);

        console.log('🌌 3D Solar System Explorer Ready');
        console.log('   🖱️ Drag to rotate | Scroll to zoom | Double-click to reset');
        console.log('   ⌨️ Keys: P=Pause R=Reset O=Orbits L=Labels F=Fullscreen Esc=Close info');
        console.log('   🌍 Languages: VI | EN | JA | FR');
        console.log('   🪐 Click a planet button to explore!');
    </script>
</body>
</html>
